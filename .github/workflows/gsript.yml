name: Label & Comment Issues and PRs

on:
  issues:
    types: [opened, reopened, closed]

  pull_request_target:
    types: [opened]

jobs:
  manage_activity:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write

    steps:
      # 🔖 Label issues when opened or reopened
      - name: Attach label to issues
        if: github.event_name == 'issues' && github.event.action != 'closed'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.addLabels({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: ["issue", "fix"]
            })

      # 💬 Comment on new issue
      - name: Comment on new issue
        if: github.event_name == 'issues' && github.event.action == 'opened'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            Thanks for opening this issue! We'll take a look as soon as possible.

      # 💬 Comment on closed issue
      - name: Comment on closed issue
        if: github.event_name == 'issues' && github.event.action == 'closed'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            This issue has been closed. If you think this is incorrect, feel free to reopen it.

      # 🎉 Comment on FIRST pull request only
      - name: Comment on first pull request
        if: github.event_name == 'pull_request_target' && github.event.pull_request.author_association == 'FIRST_TIME_CONTRIBUTOR'
        uses: peter-evans/create-or-update-comment@v4
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body: |
            🎉 Thanks for your first pull request!
            We really appreciate your contribution and will review it soon.
